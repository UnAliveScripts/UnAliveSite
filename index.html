html{

body{

.sidebar{

.tagline{

.status{

padding:8px 14px;

.nav{

padding:14px;

.nav a:hover{

.main{

.hero{

.hero p{
font-size:20px;
color:#888;
margin-top:20px;
}


.actions{
display:flex;
gap:15px;

}


.action{

border-radius:14px;
background:#151515;
border:1px solid #333;
color:white;
font-weight:700;
cursor:pointer;
transition:.2s;
}


.action:hover{
background:#222;
transform:translateY(-2px);
}



.script-box{

margin-top:40px;
max-width:900px;
background:#0d0d0d;
border:1px solid #222;
border-radius:20px;
padding:25px;

}


.script-title{

function copyScript(){

if(!script) return;


navigator.clipboard.writeText(script.innerText);


let button = document.querySelector(".action");


if(button){

setTimeout(()=>{

}
